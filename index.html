<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 N행시 짓기</title>
    <style>
        /* 깔끔하고 심플한 디자인 (CSS) */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        /* 새로 추가된 버튼 그룹 스타일 */
        .topic-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .topic-btn {
            flex: 1;
            padding: 12px 8px;
            background-color: #f8fafc;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 75px;
        }
        .topic-btn:hover {
            background-color: #e2e8f0;
        }
        /* 선택된 버튼 스타일 */
        .topic-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }

        #input-container {
            margin-bottom: 24px;
        }
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .input-group:last-child {
            margin-bottom: 0;
        }
        .input-group label {
            font-size: 18px;
            font-weight: bold;
            color: #3b82f6;
            width: 40px;
            text-align: center;
        }
        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #3b82f6;
        }
        
        #submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #10b981; /* 완성 버튼은 구분을 위해 초록색 계열로 변경 */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #submit-btn:hover {
            background-color: #059669;
        }
        
        #result-container {
            margin-top: 24px;
            padding: 20px;
            background-color: #f0f9ff;
            border-radius: 8px;
            border: 1px solid #bae6fd;
            display: none;
        }
        .result-line {
            margin: 8px 0;
            font-size: 17px;
            color: #334155;
            line-height: 1.5;
        }
        .result-line strong {
            color: #0369a1;
            font-size: 19px;
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 N행시 짓기</h1>
    
    <div class="topic-buttons">
        <button class="topic-btn" onclick="selectTopic('제주도', this)">제주도</button>
        <button class="topic-btn" onclick="selectTopic('산방산', this)">산방산</button>
        <button class="topic-btn" onclick="selectTopic('위니브', this)">위니브</button>
        <button class="topic-btn" onclick="selectTopic('오피스제주', this)">오피스제주</button>
    </div>

    <div id="input-container">
        </div>

    <button onclick="showResult()" id="submit-btn" style="display: none;">완성하기</button>

    <div id="result-container">
        </div>
</div>

<script>
    // 주제별 글자 데이터
    const wordData = {
        "제주도": ["제", "주", "도"],
        "산방산": ["산", "방", "산"],
        "위니브": ["위", "니", "브"],
        "오피스제주": ["오", "피", "스", "제", "주"]
    };

    let currentSelectedWord = "";

    // 버튼 클릭 시 실행되는 함수
    function selectTopic(word, buttonElement) {
        currentSelectedWord = word;

        // 1. 모든 버튼에서 'active' 클래스 제거 (기본 스타일로 되돌림)
        const buttons = document.querySelectorAll('.topic-btn');
        buttons.forEach(btn => btn.classList.remove('active'));

        // 2. 클릭한 버튼에만 'active' 클래스 추가 (선택된 스타일 적용)
        buttonElement.classList.add('active');

        // 3. 입력창 렌더링
        renderInputs();
    }

    // 선택한 단어에 맞게 입력창(Input)을 생성하는 함수
    function renderInputs() {
        const inputContainer = document.getElementById("input-container");
        const submitBtn = document.getElementById("submit-btn");
        const resultContainer = document.getElementById("result-container");

        // 초기화
        inputContainer.innerHTML = "";
        resultContainer.style.display = "none";
        
        if (currentSelectedWord) {
            submitBtn.style.display = "block";
            const chars = wordData[currentSelectedWord];
            
            chars.forEach((char, index) => {
                const group = document.createElement("div");
                group.className = "input-group";
                
                group.innerHTML = `
                    <label>${char}</label>
                    <input type="text" id="input-${index}" placeholder="내용을 입력하세요" autocomplete="off">
                `;
                inputContainer.appendChild(group);
            });
        }
    }

    // 입력한 내용을 바탕으로 결과를 화면에 보여주는 함수
    function showResult() {
        if (!currentSelectedWord) return;

        const chars = wordData[currentSelectedWord];
        const resultContainer = document.getElementById("result-container");
        
        resultContainer.innerHTML = ""; // 기존 결과 초기화
        
        let isAllFilled = true;

        chars.forEach((char, index) => {
            const inputVal = document.getElementById(`input-${index}`).value.trim();
            
            if (inputVal === "") {
                isAllFilled = false;
            }

            const p = document.createElement("p");
            p.className = "result-line";
            p.innerHTML = `<strong>${char}</strong> ${inputVal}`;
            resultContainer.appendChild(p);
        });

        if (!isAllFilled) {
            alert("모든 칸을 입력해주세요!");
            return;
        }

        resultContainer.style.display = "block";
    }
</script>

</body>
</html>
